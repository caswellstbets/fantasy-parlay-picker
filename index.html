<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PGA Championship 2026 Pool</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .team-row:hover { background-color: #1f2937; }
    .positive { color: #22c55e; }
    .negative { color: #ef4444; }
    .modal { animation: fadeIn 0.2s; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-7xl mx-auto p-4">
    <h1 class="text-4xl font-bold text-center my-6">2026 PGA Championship Pool</h1>
    <p class="text-center text-zinc-400 mb-8">Best 4 golfers averaged • Live • Updates every 45s</p>

    <div class="flex border-b border-zinc-700 mb-6">
      <button onclick="switchTab(0)" id="tab0" class="tab-button px-6 py-3 font-medium border-b-2 border-blue-500 text-blue-400">Teams</button>
      <button onclick="switchTab(1)" id="tab1" class="tab-button px-6 py-3 font-medium text-zinc-400">Full Field</button>
    </div>

    <div id="content0">
      <div class="overflow-x-auto">
        <table class="w-full text-sm" id="teamsTable">
          <thead>
            <tr class="border-b border-zinc-700">
              <th class="text-left py-3 px-4">Rank</th>
              <th class="text-left py-3 px-4">Entrant</th>
              <th class="text-center py-3 px-4">Team Avg</th>
              <th class="text-center py-3 px-4">% to Win</th>
              <th class="w-8"></th>
            </tr>
          </thead>
          <tbody id="teamsBody" class="divide-y divide-zinc-800"></tbody>
        </table>
      </div>
    </div>

    <div id="content1" class="hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm" id="fieldTable">
          <thead>
            <tr class="border-b border-zinc-700">
              <th class="text-left py-3 px-4">Player</th>
              <th class="text-center py-3 px-4">To Par</th>
              <th class="text-center py-3 px-4">Thru</th>
              <th class="text-center py-3 px-4">Today</th>
            </tr>
          </thead>
          <tbody id="fieldBody" class="divide-y divide-zinc-800"></tbody>
        </table>
      </div>
    </div>

    <div class="text-center text-xs text-zinc-500 mt-8">
      Last updated: <span id="lastUpdate">—</span>
    </div>
  </div>

  <!-- Simple Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-xl p-6 max-w-lg w-full mx-4 modal" id="modalContent"></div>
  </div>

  <script>
    const entrants = [ /* same array as before — unchanged */ ];

    let playersMap = new Map();
    let lastUpdateTime = "";

    async function fetchLiveData() {
      try {
        // Added cache-buster + timeout handling
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 10000);

        const res = await fetch(`https://statdata.pgatour.com/r/R2026033/leaderboard-v2mini.json?${Date.now()}`, {
          signal: controller.signal
        });
        clearTimeout(timeout);

        if (!res.ok) throw new Error("HTTP error");

        const data = await res.json();
        
        playersMap.clear();
        data.leaderboard.players.forEach(p => {
          let name = `${p.player.bio.first_name} ${p.player.bio.last_name}`.trim();
          // Normalize common mismatches
          if (name === "Ludvig Aberg") name = "Ludvig Åberg";
          if (name === "Nicolai Hojgaard") name = "Nicolai Højgaard";
          
          playersMap.set(name, {
            toPar: parseFloat(p.to_par) || 0,
            thru: p.thru || "F",
            today: p.today || "",
            status: p.status || ""
          });
        });

        lastUpdateTime = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        document.getElementById("lastUpdate").textContent = lastUpdateTime;
        
        renderTeams();
        renderField();
      } catch(e) {
        console.warn("Live data fetch failed (normal during off-hours)", e);
        document.getElementById("lastUpdate").textContent = "Offline — will retry";
      }
    }

    function getTeamScore(entry) {
      let scores = entry.golfers.map(g => {
        const p = playersMap.get(g) || {toPar: 999, thru: "—", today: ""};
        return {name: g, toPar: p.toPar, thru: p.thru, today: p.today};
      }).sort((a,b) => a.toPar - b.toPar);

      const best4 = scores.slice(0,4);
      const avg = (best4.reduce((sum, s) => sum + s.toPar, 0) / 4).toFixed(1);
      return {avg: parseFloat(avg), best4, allScores: scores};
    }

    function calculateWinProbabilities() {
      const sims = 5000; // Reduced for speed
      const winCounts = new Array(entrants.length).fill(0);
      
      for (let i = 0; i < sims; i++) {
        let teamAvgs = entrants.map((entry, idx) => {
          let projected = entry.golfers.map(g => {
            const current = playersMap.get(g) || {toPar: 0};
            const variance = (Math.random() - 0.5) * 10; // slightly higher variance
            return current.toPar + variance;
          });
          projected.sort((a,b) => a - b);
          return {idx, avg: (projected[0]+projected[1]+projected[2]+projected[3])/4};
        });
        
        teamAvgs.sort((a,b) => a.avg - b.avg);
        winCounts[teamAvgs[0].idx] += 1;
      }
      
      return entrants.map((_, i) => Math.round((winCounts[i] / sims) * 100));
    }

    function renderTeams() {
      const tbody = document.getElementById("teamsBody");
      tbody.innerHTML = "";
      
      const probs = calculateWinProbabilities();
      
      const teamsWithData = entrants.map((entry, i) => {
        const team = getTeamScore(entry);
        return {...entry, teamAvg: team.avg, best4: team.best4, prob: probs[i]};
      }).sort((a,b) => a.teamAvg - b.teamAvg);

      teamsWithData.forEach((team, index) => {
        const row = document.createElement("tr");
        row.className = "team-row cursor-pointer border-b border-zinc-800 hover:bg-zinc-900";
        row.innerHTML = `
          <td class="py-4 px-4 font-mono">${index+1}</td>
          <td class="py-4 px-4 font-medium">${team.name}</td>
          <td class="py-4 px-4 text-center font-mono text-xl ${team.teamAvg < 0 ? 'positive' : team.teamAvg > 0 ? 'negative' : ''}">${team.teamAvg}</td>
          <td class="py-4 px-4 text-center font-bold text-emerald-400">${team.prob}%</td>
          <td class="py-4 px-4"><i class="fas fa-chevron-down"></i></td>
        `;
        row.onclick = () => showTeamBreakdown(team);
        tbody.appendChild(row);
      });
    }

    function showTeamBreakdown(team) {
      let html = `<h3 class="text-2xl font-bold mb-6">${team.name} — Avg <span class="${team.teamAvg < 0 ? 'positive' : 'negative'}">${team.teamAvg}</span></h3>`;
      html += `<div class="grid grid-cols-1 gap-4">`;
      
      team.best4.forEach(p => {
        html += `
          <div class="bg-zinc-800 p-4 rounded-lg">
            <div class="font-semibold text-lg">${p.name}</div>
            <div class="text-3xl font-mono mt-1 ${p.toPar < 0 ? 'positive' : p.toPar > 0 ? 'negative' : ''}">
              ${p.toPar > 0 ? '+' : ''}${p.toPar}
            </div>
            <div class="text-sm text-zinc-400">Thru ${p.thru}</div>
          </div>`;
      });
      
      html += `</div><button onclick="closeModal()" class="mt-6 w-full py-3 bg-zinc-700 hover:bg-zinc-600 rounded-lg">Close</button>`;
      
      document.getElementById("modalContent").innerHTML = html;
      document.getElementById("modal").classList.remove("hidden");
    }

    function closeModal() {
      document.getElementById("modal").classList.add("hidden");
    }

    function renderField() { /* unchanged from previous version */ }

    function switchTab(n) { /* unchanged */ }

    // Start
    fetchLiveData();
    setInterval(fetchLiveData, 45000);
  </script>
</body>
</html>

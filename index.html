<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PGA Championship 2026 Pool</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .team-row:hover { background-color: #1f2937; }
    .positive { color: #22c55e; }
    .negative { color: #ef4444; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-7xl mx-auto p-4">
    <h1 class="text-4xl font-bold text-center my-6">2026 PGA Championship Pool</h1>
    <p class="text-center text-zinc-400 mb-2">Best 4 golfers averaged • Lowest wins</p>
    
    <div class="flex justify-center gap-4 mb-8">
      <button onclick="manualRefresh()" 
              class="px-6 py-3 bg-blue-600 hover:bg-blue-500 rounded-lg font-medium flex items-center gap-2">
        <i class="fas fa-sync"></i> Refresh Live Data
      </button>
    </div>

    <!-- Tabs -->
    <div class="flex border-b border-zinc-700 mb-6">
      <button onclick="switchTab(0)" id="tab0" class="tab-button px-6 py-3 font-medium border-b-2 border-blue-500 text-blue-400">Teams</button>
      <button onclick="switchTab(1)" id="tab1" class="tab-button px-6 py-3 font-medium text-zinc-400">Full Field</button>
    </div>

    <!-- TEAMS TAB -->
    <div id="content0">
      <div id="simLoading" class="hidden text-center py-8 text-zinc-400">
        <i class="fas fa-spinner fa-spin text-2xl mb-3"></i><br>
        Running Monte Carlo simulation...<br>
        <span class="text-xs">(~5000 runs for win %)</span>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm" id="teamsTable">
          <thead>
            <tr class="border-b border-zinc-700">
              <th class="text-left py-3 px-4">Rank</th>
              <th class="text-left py-3 px-4">Entrant</th>
              <th class="text-center py-3 px-4">Team Avg (best 4)</th>
              <th class="text-center py-3 px-4">% to Win</th>
              <th class="w-8"></th>
            </tr>
          </thead>
          <tbody id="teamsBody" class="divide-y divide-zinc-800"></tbody>
        </table>
      </div>
    </div>

    <!-- FIELD TAB -->
    <div id="content1" class="hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm" id="fieldTable">
          <thead>
            <tr class="border-b border-zinc-700">
              <th class="text-left py-3 px-4">Player</th>
              <th class="text-center py-3 px-4">To Par</th>
              <th class="text-center py-3 px-4">Thru</th>
              <th class="text-center py-3 px-4">Today</th>
            </tr>
          </thead>
          <tbody id="fieldBody" class="divide-y divide-zinc-800"></tbody>
        </table>
      </div>
    </div>

    <div class="text-center text-xs text-zinc-500 mt-8">
      Last updated: <span id="lastUpdate">Never</span>
    </div>
  </div>

  <!-- Modal for team breakdown -->
  <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-2xl p-8 max-w-lg w-full mx-4 max-h-[90vh] overflow-auto" id="modalContent"></div>
  </div>

    let playersMap = new Map();

    async function fetchLiveData() {
      const loadingEl = document.getElementById("lastUpdate");
      loadingEl.textContent = "Fetching...";

      try {
        const res = await fetch(`https://statdata.pgatour.com/r/R2026033/leaderboard-v2mini.json?${Date.now()}`);
        
        if (!res.ok) throw new Error("No data");

        const data = await res.json();
        
        playersMap.clear();
        data.leaderboard.players.forEach(p => {
          let name = `${p.player.bio.first_name} ${p.player.bio.last_name}`.trim();
          // Normalize names
          if (name.includes("Aberg")) name = "Ludvig Åberg";
          if (name.includes("Hojgaard")) name = "Nicolai Højgaard";
          
          playersMap.set(name, {
            toPar: parseFloat(p.to_par) || 0,
            thru: p.thru || "F",
            today: p.today || ""
          });
        });

        loadingEl.textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        renderAll();
      } catch(e) {
        console.warn(e);
        loadingEl.textContent = "Data unavailable (early round) — try Refresh";
      }
    }

<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PGA Championship 2026 Pool • LIVE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .team-row:hover { background-color: #1f2937; }
    .positive { color: #22c55e; }
    .negative { color: #ef4444; }
    .best4 { font-size: 0.8rem; color: #a3e635; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-7xl mx-auto p-4">
    <h1 class="text-4xl font-bold text-center my-6">2026 PGA Championship Pool</h1>
    <p class="text-center text-zinc-400 mb-2">Best 4 golfers averaged • Lowest wins • $460 pot</p>
    
    <div class="flex justify-center gap-4 mb-8 flex-wrap">
      <button onclick="manualRefresh()" class="px-6 py-3 bg-blue-600 hover:bg-blue-500 rounded-lg font-medium flex items-center gap-2">
        <i class="fas fa-sync"></i> Refresh Live Data (ESPN)
      </button>
      <button onclick="showDebugModal()" class="px-6 py-3 bg-zinc-700 hover:bg-zinc-600 rounded-lg font-medium flex items-center gap-2">
        <i class="fas fa-bug"></i> Show Debug Info
      </button>
    </div>

    <div id="statusBar" class="text-center text-sm mb-6 text-zinc-400"></div>

    <div class="flex border-b border-zinc-700 mb-6">
      <button onclick="switchTab(0)" id="tab0" class="tab-button px-6 py-3 font-medium border-b-2 border-blue-500 text-blue-400">Teams</button>
      <button onclick="switchTab(1)" id="tab1" class="tab-button px-6 py-3 font-medium text-zinc-400">Full Field</button>
    </div>

    <!-- TEAMS TAB -->
    <div id="content0">
      <div id="simLoading" class="hidden text-center py-8 text-zinc-400">
        <i class="fas fa-spinner fa-spin text-2xl mb-3"></i><br>Running Monte Carlo simulation...
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm" id="teamsTable">
          <thead>
            <tr class="border-b border-zinc-700">
              <th class="text-left py-3 px-4">Rank</th>
              <th class="text-left py-3 px-4">Entrant + Best 4</th>
              <th class="text-center py-3 px-4">Team Avg</th>
              <th class="text-center py-3 px-4">% to Win</th>
              <th class="w-8"></th>
            </tr>
          </thead>
          <tbody id="teamsBody" class="divide-y divide-zinc-800"></tbody>
        </table>
      </div>
    </div>

    <!-- FIELD TAB -->
    <div id="content1" class="hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm" id="fieldTable">
          <thead>
            <tr class="border-b border-zinc-700">
              <th class="text-left py-3 px-4">Player</th>
              <th class="text-center py-3 px-4">To Par</th>
              <th class="text-center py-3 px-4">Thru</th>
              <th class="text-center py-3 px-4">Today</th>
            </tr>
          </thead>
          <tbody id="fieldBody" class="divide-y divide-zinc-800"></tbody>
        </table>
      </div>
    </div>

    <div class="text-center text-xs text-zinc-500 mt-8">
      Last updated: <span id="lastUpdate">Never</span>
    </div>
  </div>

  <!-- Debug Modal -->
  <div id="debugModal" onclick="if(event.target.id==='debugModal')hideDebugModal()" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
    <div class="bg-zinc-900 rounded-3xl p-6 max-w-4xl w-full max-h-[90vh] overflow-auto">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">🔧 Debug Information</h2>
        <button onclick="hideDebugModal()" class="text-xl">✕</button>
      </div>
      <div id="debugContent" class="space-y-8 text-sm"></div>
    </div>
  </div>

  <!-- Team Breakdown Modal -->
  <div id="modal" onclick="if(event.target.id==='modal')closeModal()" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div id="modalContent" class="bg-zinc-900 rounded-2xl p-8 max-w-lg w-full mx-4 max-h-[90vh] overflow-auto"></div>
  </div>

  <script>
    const entrants = [
      {name: "Tyler Happ", golfers: ["Scottie Scheffler","Xander Schauffele","Justin Rose","Rickie Fowler","Sam Burns","Brooks Koepka","Alex Fitzpatrick","Max Homa"]},
      {name: "Charles Vinsonhaler", golfers: ["Scottie Scheffler","Tyrrell Hatton","Jacob Bridgeman","Keegan Bradley","Rickie Fowler","Jason Day","Bud Cauley"]},
      {name: "Chad Tart", golfers: ["Scottie Scheffler","Xander Schauffele","Ludvig Åberg","Tommy Fleetwood","Sam Stevens","Alex Fitzpatrick"]},
      {name: "Tessa Johnson", golfers: ["Cameron Young","Ben Griffin","Akshay Bhatia","Patrick Reed","Adam Scott","Shane Lowry","Sungjae Im"]},
      {name: "Bill Sessler", golfers: ["Xander Schauffele","Aaron Rai","Sam Burns","Adam Scott","Jason Day","Shane Lowry","Rickie Fowler","Jordan Spieth","Brooks Koepka","Brandt Snedeker"]},
      {name: "Logan Robbins", golfers: ["Scottie Scheffler","Chris Gotterup","Ludvig Åberg","Patrick Reed","Brooks Koepka","Wyndham Clark","Alex Fitzpatrick","Sungjae Im"]},
      {name: "Eric Oplinger", golfers: ["Scottie Scheffler","Ludvig Åberg","Patrick Cantlay","Nicolai Højgaard","Rickie Fowler","Sungjae Im","Brooks Koepka","Wyndham Clark"]},
      {name: "Tim Johnson", golfers: ["Scottie Scheffler","Tommy Fleetwood","Shane Lowry","Jordan Spieth","Gary Woodland","Rickie Fowler","Brooks Koepka","Max Homa","Wyndham Clark"]},
      {name: "Jon Sousa", golfers: ["Scottie Scheffler","Jon Rahm","Rickie Fowler","Sam Burns","Adam Scott","Brooks Koepka","Alex Smalley","Alex Fitzpatrick","Keith Mitchell","Sahith Theegala"]},
      {name: "Kevin Mulhern", golfers: ["Scottie Scheffler","Justin Rose","JJ Spaun","Patrick Cantlay","Sam Burns","Shane Lowry"]},
      {name: "Trey Anderson", golfers: ["Cameron Young","Ludvig Åberg","Nicolai Højgaard","Shane Lowry","Rickie Fowler","Gary Woodland","Alex Fitzpatrick","Brooks Koepka"]},
      {name: "Hunter Bryson", golfers: ["Scottie Scheffler","JJ Spaun","Xander Schauffele","Ludvig Åberg","Hideki Matsuyama"]},
      {name: "Ben Scerri", golfers: ["Cameron Young","Russell Henley","Tyrrell Hatton","Hideki Matsuyama","Rickie Fowler","Sam Burns"]},
      {name: "Mike Sawaia", golfers: ["Scottie Scheffler","Xander Schauffele","Tommy Fleetwood","Jon Rahm","Hideki Matsuyama"]},
      {name: "Emma Sawaia", golfers: ["Matt Fitzpatrick","Tommy Fleetwood","Jon Rahm","Tyrrell Hatton","Rickie Fowler","Wyndham Clark"]},
      {name: "Mikey Goldberg", golfers: ["Scottie Scheffler","Tommy Fleetwood","Xander Schauffele","Ludvig Åberg","Rickie Fowler","Brooks Koepka"]},
      {name: "Berk Olgun", golfers: ["Scottie Scheffler","Jordan Spieth","Sam Burns","Adam Scott","Rickie Fowler","Shane Lowry","Jason Day","Brooks Koepka","Sungjae Im","Wyndham Clark"]},
      {name: "Max Hattman", golfers: ["Scottie Scheffler","Tommy Fleetwood","Ludvig Åberg","Patrick Reed","Sam Burns","Wyndham Clark","Brooks Koepka"]},
      {name: "Sarah Anderson", golfers: ["Scottie Scheffler","Tommy Fleetwood","Ludvig Åberg","David Puig","Sam Stevens","Matt McCarty"]},
      {name: "Greg Grattan", golfers: ["Rory McIlroy","Ludvig Åberg","Xander Schauffele","Sam Burns","Jordan Spieth","Alex Fitzpatrick","Sungjae Im","Brooks Koepka"]},
      {name: "Livy Franklin", golfers: ["Scottie Scheffler","Jon Rahm","Shane Lowry","Corey Conners","Jordan Spieth","Sungjae Im","JT Poston","Alex Fitzpatrick","Lucas Glover","Christian Bezuidenhout"]},
      {name: "John Morrison", golfers: ["Scottie Scheffler","Akshay Bhatia","Sam Burns","Shane Lowry","Joaquin Niemann","Corey Conners","Brooks Koepka","Sahith Theegala","Wyndham Clark","Max Homa"]},
      {name: "Nick Rosshirt", golfers: ["Scottie Scheffler","Jon Rahm","Rickie Fowler","Sam Burns","Adam Scott","Alex Fitzpatrick","Sungjae Im","Brooks Koepka","Alex Smalley","Sudarshan Yellamaraju"]}
    ];

    let playersMap = new Map();
    let lastRawData = null;

    async function fetchLiveData() {
      const statusEl = document.getElementById("statusBar");
      const updateEl = document.getElementById("lastUpdate");
      statusEl.innerHTML = `<span class="text-yellow-400">🔄 Fetching from ESPN...</span>`;
      updateEl.textContent = "Fetching...";

      try {
        const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard?event=401811947&t=${Date.now()}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        lastRawData = data;

        playersMap.clear();

        const competitors = data.events?.[0]?.competitions?.[0]?.competitors || [];

        competitors.forEach(c => {
          let name = c.athlete?.displayName?.trim();
          if (!name) return;

          // Name normalization
          name = name.replace("J.J. Spaun", "JJ Spaun")
                     .replace("J.T. Poston", "JT Poston")
                     .replace("Joaquín Niemann", "Joaquin Niemann")
                     .replace("Christiaan Bezuidenhout", "Christian Bezuidenhout");

          // To Par
          let toPar = 0;
          if (c.score !== undefined) {
            toPar = parseFloat(String(c.score).replace('+','').replace('−','-')) || 0;
          }

          // Thru - Final improved logic
          let thru = "—";
          const statusDetail = c.status?.type?.shortDetail || "";
          if (statusDetail) {
            thru = statusDetail;                    // "Thru 12", "F", "11:00 AM", etc.
          } else if (c.thru) {
            thru = `Thru ${c.thru}`;
          } else if (c.linescores && c.linescores.length > 0) {
            const completed = c.linescores.filter(l => l.value != null).length;
            thru = completed > 0 ? `Thru ${completed}` : "—";
          }

          playersMap.set(name, {
            toPar: toPar,
            thru: thru,
            today: c.score || ""
          });
        });

        statusEl.innerHTML = `<span class="text-green-400">✅ Loaded ${playersMap.size} players</span>`;
        updateEl.textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        renderAll();
      } catch(e) {
        statusEl.innerHTML = `<span class="text-red-400">❌ ${e.message}</span>`;
        console.error(e);
      }
    }

    // getTeamScore, calculateWinProbabilities, renderTeams, showTeamBreakdown, renderField, etc. remain the same as the last version

    function getTeamScore(entry) {
      let matched = 0;
      let scores = entry.golfers.map(g => {
        const p = playersMap.get(g);
        if (p) matched++;
        return {name: g, toPar: p ? p.toPar : 999, thru: p ? p.thru : "—"};
      }).sort((a,b) => a.toPar - b.toPar);

      const best4 = scores.slice(0,4);
      const avg = (best4.reduce((sum, s) => sum + s.toPar, 0) / 4).toFixed(1);
      return {avg: parseFloat(avg), best4, allScores: scores, matchedCount: matched};
    }

    function calculateWinProbabilities() {
      const simLoading = document.getElementById("simLoading");
      simLoading.classList.remove("hidden");
      return new Promise(resolve => {
        setTimeout(() => {
          const sims = 5000;
          const winCounts = new Array(entrants.length).fill(0);
          for (let i = 0; i < sims; i++) {
            let teamAvgs = entrants.map((entry, idx) => {
              let projected = entry.golfers.map(g => {
                const current = playersMap.get(g) || {toPar: 0};
                return current.toPar + (Math.random() - 0.5) * 12;
              });
              projected.sort((a,b) => a - b);
              return {idx, avg: (projected[0]+projected[1]+projected[2]+projected[3])/4};
            });
            teamAvgs.sort((a,b) => a.avg - b.avg);
            winCounts[teamAvgs[0].idx]++;
          }
          simLoading.classList.add("hidden");
          resolve(entrants.map((_, i) => Math.round((winCounts[i] / sims) * 100)));
        }, 10);
      });
    }

    async function renderTeams() {
      const probs = await calculateWinProbabilities();
      const tbody = document.getElementById("teamsBody");
      tbody.innerHTML = "";

      const teamsWithData = entrants.map((entry, i) => {
        const team = getTeamScore(entry);
        return { ...entry, teamAvg: team.avg, best4: team.best4, allScores: team.allScores, prob: probs[i] };
      }).sort((a,b) => a.teamAvg - b.teamAvg);

      teamsWithData.forEach((team, index) => {
        const best4Str = team.best4.map(p => `${p.name} (${p.toPar > 0 ? '+' : ''}${p.toPar})`).join(", ");
        const row = document.createElement("tr");
        row.className = "team-row cursor-pointer border-b border-zinc-800 hover:bg-zinc-900";
        row.innerHTML = `
          <td class="py-4 px-4 font-mono">${index+1}</td>
          <td class="py-4 px-4">
            <div class="font-medium">${team.name}</div>
            <div class="best4">Best 4: ${best4Str}</div>
          </td>
          <td class="py-4 px-4 text-center font-mono text-xl ${team.teamAvg < 0 ? 'positive' : team.teamAvg > 0 ? 'negative' : ''}">${team.teamAvg}</td>
          <td class="py-4 px-4 text-center font-bold text-emerald-400">${team.prob}%</td>
          <td class="py-4 px-4"><i class="fas fa-chevron-down"></i></td>
        `;
        row.onclick = () => showTeamBreakdown(team);
        tbody.appendChild(row);
      });
    }

    function showTeamBreakdown(team) {
      let html = `<h3 class="text-2xl font-bold mb-6">${team.name} — Avg <span class="${team.teamAvg < 0 ? 'positive' : 'negative'}">${team.teamAvg}</span></h3>`;
      html += `<div class="space-y-4">`;
      team.allScores.forEach(p => {
        const isBest = team.best4.some(b => b.name === p.name);
        html += `
          <div class="${isBest ? 'bg-emerald-900/30 border border-emerald-500' : 'bg-zinc-800'} p-5 rounded-xl flex justify-between items-center">
            <div>
              <div class="font-semibold">${p.name}</div>
              <div class="text-sm text-zinc-400">${p.thru}</div>
            </div>
            <div class="text-4xl font-mono ${p.toPar < 0 ? 'positive' : p.toPar > 0 ? 'negative' : ''}">${p.toPar > 0 ? '+' : ''}${p.toPar}</div>
            ${isBest ? '<span class="text-xs bg-emerald-600 px-3 py-1 rounded-full">BEST 4</span>' : ''}
          </div>`;
      });
      html += `</div><button onclick="closeModal()" class="mt-8 w-full py-4 bg-zinc-700 hover:bg-zinc-600 rounded-xl">Close</button>`;
      document.getElementById("modalContent").innerHTML = html;
      document.getElementById("modal").classList.remove("hidden");
    }

    function closeModal() { document.getElementById("modal").classList.add("hidden"); }

    function renderField() {
      const tbody = document.getElementById("fieldBody");
      tbody.innerHTML = "";
      Array.from(playersMap.entries()).sort((a,b) => a[1].toPar - b[1].toPar)
        .forEach(([name, d]) => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td class="py-3 px-4">${name}</td>
            <td class="py-3 px-4 text-center font-mono text-lg ${d.toPar < 0 ? 'positive' : d.toPar > 0 ? 'negative' : ''}">${d.toPar > 0 ? '+' : ''}${d.toPar}</td>
            <td class="py-3 px-4 text-center font-mono">${d.thru}</td>
            <td class="py-3 px-4 text-center">${d.today}</td>
          `;
          tbody.appendChild(row);
        });
    }

    async function renderAll() { await renderTeams(); renderField(); }

    function manualRefresh() { fetchLiveData(); }

    function switchTab(n) {
      document.querySelectorAll('.tab-button').forEach((b,i) => {
        b.classList.toggle('border-blue-500', i===n);
        b.classList.toggle('text-blue-400', i===n);
        b.classList.toggle('text-zinc-400', i!==n);
      });
      document.getElementById("content0").classList.toggle("hidden", n!==0);
      document.getElementById("content1").classList.toggle("hidden", n!==1);
    }

    function showDebugModal() {
      const content = document.getElementById("debugContent");
      let html = `<div><strong>Players loaded:</strong> ${playersMap.size}</div>`;
      html += `<div><strong>Last update:</strong> ${document.getElementById("lastUpdate").textContent}</div><hr>`;

      entrants.forEach(entry => {
        const team = getTeamScore(entry);
        const percent = Math.round((team.matchedCount / entry.golfers.length) * 100);
        html += `<div class="flex justify-between text-xs"><span>${entry.name}</span><span class="${percent===100?'text-green-400':'text-yellow-400'}">${team.matchedCount}/${entry.golfers.length} (${percent}%)</span></div>`;
      });

      if (lastRawData) {
        html += `<hr><div class="font-semibold">Sample Thru Raw Data (first 8 players)</div>`;
        const sample = (lastRawData.events?.[0]?.competitions?.[0]?.competitors || []).slice(0,8);
        html += `<pre class="bg-black p-3 rounded-2xl overflow-auto text-[10px]">${JSON.stringify(sample.map(c => ({
          name: c.athlete?.displayName,
          score: c.score,
          status: c.status?.type?.shortDetail,
          thru: c.thru,
          linescoresLength: c.linescores ? c.linescores.length : 0
        })), null, 2)}</pre>`;
      }

      content.innerHTML = html;
      document.getElementById("debugModal").classList.remove("hidden");
    }

    function hideDebugModal() { document.getElementById("debugModal").classList.add("hidden"); }

    // Initial load
    fetchLiveData();
  </script>
</body>
</html>
